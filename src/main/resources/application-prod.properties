# ==============================
# FEEINS Catalogue - Configuration PRODUCTION (Neon PostgreSQL)
# ==============================

server.port=${PORT:5000}

# ==============================
# BASE DE DONNÉES Neon PostgreSQL
# DATABASE_URL format : jdbc:postgresql://ep-xxx.neon.tech/neondb?sslmode=require
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool HikariCP — important car Neon ferme les connexions inactives
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.keepalive-time=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Désactiver H2 en production
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# JWT
jwt.secret=${JWT_SECRET:feeins-secret-key-catalogue-pedagogique-2025-super-secure}
jwt.expiration=86400000

# Code accès enseignant
app.teacher.access-code=${TEACHER_ACCESS_CODE:FEEINS2025}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:*}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.use-root-path=true