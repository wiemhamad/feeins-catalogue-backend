# ==============================
# FEEINS Catalogue - Configuration DEV (H2)
# ==============================

server.port=5000

# Base de données H2 (développement local)
spring.datasource.url=jdbc:h2:mem:feeinsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=feeins-secret-key-catalogue-pedagogique-2025-super-secure
jwt.expiration=86400000

# Code accès enseignant
app.teacher.access-code=FEEINS2025

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.use-root-path=true
