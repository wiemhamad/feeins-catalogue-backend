# ==============================
# FEEINS — Configuration locale (Neon PostgreSQL)
# ==============================

server.port=5000

# ===== NEON POSTGRESQL =====
spring.datasource.url=jdbc:postgresql://ep-wild-snow-anc3jr5s-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_niYHN9WKo5eQ
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool HikariCP — optimisé pour Neon (serverless PostgreSQL)
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA — performances
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# H2 désactivé
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# JWT
jwt.secret=feeins-secret-key-catalogue-pedagogique-2025-super-secure
jwt.expiration=86400000

# Enseignant
app.teacher.access-code=FEEINS2025

# CORS local
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.use-root-path=true